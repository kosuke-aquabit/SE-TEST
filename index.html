<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartPlate 保護コンテンツ</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
      }
      .status {
        margin-top: 1.5rem;
        font-size: 2rem;
        font-weight: 700;
        border: 1px solid #7775;
        border-radius: 12px;
        padding: 1.5rem;
      }
      .ok {
        color: #0a7f2e;
      }
      .ng {
        color: #c1121f;
      }
      .sub {
        margin-top: 1rem;
        color: #666;
        font-size: 0.95rem;
      }
      .content {
        margin-top: 1.2rem;
        border: 1px solid #7775;
        border-radius: 12px;
        padding: 1rem 1.2rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>SmartPlate 保護コンテンツページ</h1>
    <p>
      このページは URL の <code>hs</code> を自動検証し、NFC経由の有効アクセス時のみコンテンツを表示します。
    </p>
    <div id="status" class="status">判定中...</div>
    <div id="sub" class="sub"></div>
    <section id="secure-content" class="content">
      <h2>適切なコンテンツ</h2>
      <p>この内容は SmartPlate の検証を通過したアクセスでのみ表示されます。</p>
    </section>

    <script>
      const statusEl = document.getElementById("status");
      const subEl = document.getElementById("sub");
      const contentEl = document.getElementById("secure-content");

      const qs = new URLSearchParams(window.location.search);
      const hs = qs.get("hs");

      async function judge() {
        if (!hs) {
          statusEl.className = "status ng";
          statusEl.textContent = "不正なアクセスです。";
          subEl.textContent = "理由: hs パラメータがありません。";
          contentEl.style.display = "none";
          return;
        }
        statusEl.textContent = "判定中...";
        subEl.textContent = "";
        try {
          const res = await fetch("/api/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ hs }),
          });
          const json = await res.json();
          if (res.ok && json.ok) {
            statusEl.className = "status ok";
            statusEl.textContent = "セキュアなアクセスです。";
            subEl.textContent = "検証結果: ACCESS_ALLOWED";
            contentEl.style.display = "block";
            return;
          }
          statusEl.className = "status ng";
          statusEl.textContent = "不正なアクセスです。";
          subEl.textContent = `検証結果: ${json.error || "DENIED"} (HTTP ${res.status})`;
          contentEl.style.display = "none";
        } catch (err) {
          statusEl.className = "status ng";
          statusEl.textContent = "不正なアクセスです。";
          subEl.textContent = `通信エラー: ${err.message}`;
          contentEl.style.display = "none";
        }
      }

      judge();
    </script>
  </body>
</html>
